{% load static %}

{% block content %}
<div class="chat-widget fixed  w-full h-full bg-black/60 z-40 transition-all duration-300">

    <div class="chat-box open w-full h-full overflow-hidden text-gray-200 flex flex-col border border-gray-800/50"
        id="chat-box">

        <!-- Header -->
        <div class="chat-box-header flex items-center justify-between px-4 py-3 bg-[#0e1621] border-b border-gray-800">
            <div class="text-lg font-semibold">چت آنلاین</div>
            <div class="flex items-center gap-3">
                <button onclick="ChangeStyle()" class="p-2 rounded-full hover:bg-gray-800/60 transition">
                    <div class="relative w-5 h-5">
                        <svg class="lucide lucide-sun absolute inset-0 text-amber-400 transition-all duration-500 ease-in-out"
                            :class="{ 'rotate-90 scale-0 opacity-0': isDarkMode }" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path
                                d="M12 1v2 M12 21v2 M4.93 4.93l1.41 1.41 M17.66 17.66l1.41 1.41 M2 12h2 M20 12h2 M6.34 17.66l-1.41 1.41 M19.07 4.93l-1.41 1.41" />
                        </svg>
                        <svg class="lucide lucide-moon absolute inset-0 text-indigo-400 transition-all duration-500 ease-in-out"
                            :class="{ 'rotate-0 scale-100 opacity-100': isDarkMode, 'scale-0 opacity-0': !isDarkMode }"
                            width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </div>
                </button>
                <button id="open-sidebar" class="menu-btn md:hidden text-2xl cursor-pointer">☰</button>
            </div>
        </div>

        <div class="chat-box-body z- flex flex-1 overflow-hidden relative text-lg md:text-[22px] sm:text-base">
            <aside id="sidebar" class="fixed inset-0 z-50 flex flex-col bg-gradient-to-b from-slate-950 to-slate-900 text-slate-100
                transition-transform duration-300 ease-in-out
                translate-x-0
                md:translate-x-0 md:static md:inset-auto md:w-90 lg:w-lg md:z-auto
                md:border-r md:border-slate-800">
                <div
                    class="md:hidden flex items-center justify-between px-5 py-4 border-b border-slate-800/70 bg-slate-950/60 backdrop-blur-sm">
                    <h2 class="text-lg font-semibold tracking-tight text-slate-200">
                        چت‌ها
                    </h2>
                    <button id="close-sidebar"
                        class="p-2 rounded-full hover:bg-slate-800/70 active:bg-slate-700 transition-colors"
                        aria-label="بستن منو">
                        <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div
                    class="flex-1 overflow-y-auto px-3 py-4 scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-slate-950">
                    <ul id="sidebar-chatList" class="space-y-1.5">
                    </ul>
                </div>

                <div class="p-4 border-t border-slate-800/60 bg-slate-950/40">
                    <div id="sidebar-prompt" class="hidden flex flex-col gap-3 mb-4">
                        <input id="sidebar-chatName" type="text" placeholder="اسم چت جدید..."
                            class="w-full px-4 py-3 bg-slate-800/70 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-teal-500/70 focus:ring-2 focus:ring-teal-500/20 transition-all text-right" />
                        <button id="sidebar-saveBtn"
                            class="py-3 bg-gradient-to-r from-teal-600 to-teal-500 hover:from-teal-500 hover:to-teal-400 rounded-xl font-medium text-white shadow-lg shadow-teal-900/30 transition-all active:scale-[0.98]">
                            ایجاد چت
                        </button>
                    </div>

                    <div class="flex justify-center">
                        <button id="sidebar-addBtn"
                            class="w-14 h-14 rounded-2xl bg-gradient-to-br from-teal-600 to-teal-500 text-white text-3xl font-bold flex items-center justify-center shadow-xl shadow-teal-900/40 hover:shadow-2xl hover:shadow-teal-900/60 hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer">
                            +
                        </button>
                    </div>
                </div>
            </aside>

            <div class="flex-1 flex flex-col w-0 bg-[#0f1621] relative">
                <div class="chat-logs flex flex-col flex-1 overflow-x-hidden p-4 gap-y-2 bg-fixed"
                    style="background: url('{% static 'background.svg' %}'); background-color: #bdcdff99"
                    id="chat-logs">
                    <div id="sentinel"></div>
                </div>
                <button id="toBottom"
                    class="absolute bottom-24 left-6 bg-gray-800/80 text-white py-2.5 px-3 rounded-full shadow-lg hover:bg-gray-700 transition hidden z-999 cursor-pointer select-none">
                    ↓
                </button>
                <!-- Reply Preview -->
                <div id="reply-preview" class="reply-preview hidden px-4 pt-2.5 bg-[#212936]">
                    <div class="reply-header flex justify-between text-sm text-gray-400 mb-1">
                        <span id="reply-from" class="text-xl text-right color-blue-300 select-none">پاسخ به</span>
                        <button id="reply-cancel" type="button"
                            class="text-red-400 hover:text-red-300 h-0 text-2xl cursor-pointer select-none">✕</button>
                    </div>
                    <div id="reply-text" class="reply-text text-white text-sm truncate select-none"></div>
                </div>

                <!-- Input Area -->
                <div class="chat-input-area relative flex justify-between items-center w-full p-3 bg-[#212936]">
                    <label for="file-upload"
                        class="chat-file-upload flex items-center cursor-pointer text-white transition p-2">
                        <svg class="cursor-pointer text-blue-300 fill-blue-200" width="34" height="34"
                            xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd">
                            <path
                                d="M0 12c0 6.627 5.373 12 12 12s12-5.373 12-12-5.373-12-12-12-12 5.373-12 12zm18-1h-4v7h-4v-7h-4l6-6 6 6z" />
                        </svg>
                    </label>
                    <input class="hidden" id="file-upload" type="file" accept="*" />
                    <div class="right-container flex gap-4 items-center justify-end w-full">
                        <textarea dir="rtl"
                            class="w-0 flex-1 content-center bg-[#212936] text-base text-white placeholder-gray-400 [field-sizing:content] min-h-10 max-h-48 resize-none overflow-hiddenpr-10 border-none focus:outline-none focus:border-none"
                            id="chat-input-text" placeholder="پیام خود را بنویسید...." autocomplete="off"
                            autofocus=false></textarea>

                        <div class="emoji-container absolute w-[300px] h-[400px] right-[60px] bottom-[20px] -z-1"></div>
                        <div id="emoji-picker"
                            class="absolute bottom-full right-0 md:gap-5 mr-6 mb-3 p-3 pr-7 hidden grid-cols-5 lg:grid-cols-7 gap-x-5 w-85 max-h-100 overflow-x-hidden overflow-y-auto bg-[#2d3748] border border-gray-600 rounded-xl shadow-2xl z-50">
                        </div>

                        <svg id="emoji-btn" class="cursor-pointer 0 stroke-gray-400" width="27" height="27"
                            xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" clip-rule="evenodd">
                            <path
                                d="M12 0c6.623 0 12 5.377 12 12s-5.377 12-12 12-12-5.377-12-12 5.377-12 12-12zm0 1c6.071 0 11 4.929 11 11s-4.929 11-11 11-11-4.929-11-11 4.929-11 11-11zm-.045 17.51h-.015c-2.285 0-4.469-1.189-6.153-3.349l.789-.614c1.489 1.911 3.394 2.963 5.364 2.963h.013c1.987-.004 3.907-1.078 5.408-3.021l.791.611c-1.693 2.194-3.894 3.405-6.197 3.41zm-3.468-10.01c.552 0 1 .448 1 1s-.448 1-1 1-1-.448-1-1 .448-1 1-1zm7.013 0c.552 0 1 .448 1 1s-.448 1-1 1-1-.448-1-1 .448-1 1-1z" />
                        </svg>

                        <svg id="chat-submit"
                            class="send-icon w-8 h-10 relative mb-3 text-blue-300 hover:text-blue-400 cursor-pointer transition-all duration-200 active:scale-90 rotate-[-15deg]"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="{%static 'js/theme.js'%}"></script>
<script src="{% static 'js/config.js' %}"></script>
<script src="{% static 'js/state.js' %}"></script>
<script src="{% static 'js/scrollControler.js' %}"></script>
<script type="module" src="{% static 'js/normalize.js' %}"></script>
<script type="module" src="{% static 'js/replyManager.js' %}"></script>
<script type="module" src="{% static 'js/reaction.js' %}"></script>
<script type="module" src="{% static 'js/chatListManager.js' %}"></script>
<script type="module" src="{% static 'js/main.js' %}"></script>
<script type="module" src="{% static 'js/emojis.js' %}"></script>
<script type="module" src="{% static 'js/cache.js' %}"></script>
{% endblock content %}
