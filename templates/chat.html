{% load static %}

{% block dynamic_header %}
<link rel='stylesheet' href="{% static 'chat.css' %}" type='text/css' />
{% endblock dynamic_header %}

{% block content %}
<div id="chat-circle" class="pulse">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" width="45" viewBox="0 0 24 24" stroke-width="1.8"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
    </svg>
    <span class="notification-badge" id="notification-badge">0</span>
</div>
<div class="chat-widget">
    <div class="chat-box open" id="chat-box">
        <div class="chat-box-header">
            <div>چت انلاینمون</div>
        </div>

        <div class="overlay hidden"></div>
        <div class="chat-box-body">
            <div class="chat-logs" id="chat-logs">
            </div>
        </div>

        <div class="chat-input-area">
            <label for="file-upload" class="chat-file-upload">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" width="24" height="24">
                    <path
                        d="M5 5h-3v-1h3v1zm8 5c-1.654 0-3 1.346-3 3s1.346 3 3 3 3-1.346 3-3-1.346-3-3-3zm11-4v15h-24v-15h5.93c.669 0 1.293-.334 1.664-.891l1.406-2.109h8l1.406 2.109c.371.557.995.891 1.664.891h3.93zm-19 4c0-.552-.447-1-1-1-.553 0-1 .448-1 1s.447 1 1 1c.553 0 1-.448 1-1zm13 3c0-2.761-2.239-5-5-5s-5 2.239-5 5 2.239 5 5 5 5-2.239 5-5z" />
                </svg>
            </label>
            <input id="file-upload" type="file" accept="*" style="display: none;">

            <button class="chat-submit" id="chat-submit">
                <svg xmlns="http://www.w3.org/2000/svg" fill="white" width="24" height="24" viewBox="0 0 24 24">
                    <path
                        d="M24 0l-6 22-8.129-7.239 7.802-8.234-10.458 7.227-7.215-1.754 24-12zm-15 16.668v7.332l3.258-4.431-3.258-2.901z" />
                </svg>
            </button>
            <textarea class="auto-box" id="chat-input-text" placeholder="پیام خود را بنویسید..."
                autocomplete="off"></textarea>
        </div>
    </div>
</div>

<script src="{% static 'normalize.js' %}"></script>
<script src="{% static 'imageManager.js' %}"></script>
<script src="{% static 'chat.js' %}"></script>
{% endblock content %}
