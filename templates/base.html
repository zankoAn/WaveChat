{% load static %}
<!DOCTYPE html>
<html itemscope="itemscope" itemtype="http://schema.org/WebPage" lang="fa-IR">

<head>
    <meta charset="utf-8" />
    <meta name='robots' content='max-image-preview:large, index, follow' />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="content-type" content="text/html;charset=UTF-8" />
    <script type="module" src="{% static 'js/browser-image-compression.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="bg-[#0f1621] min-h-screen font-sans antialiased">
    <div class="base-page flex flex-col h-screen">

        <div id="userModal"
            class="hidden fixed inset-0 z-[9999] bg-black/70 backdrop-blur-sm flex items-center justify-center">
            <div
                class="bg-[#17212b] p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center border border-gray-700">

                <div class="flex border-b border-gray-700 mb-6 text-sm font-medium">
                    <button id="tab-login"
                        class="flex-1 pb-3 text-teal-500 border-b-2 border-teal-600 focus:outline-none transition">
                        ورود
                    </button>
                    <button id="tab-register"
                        class="flex-1 pb-3 text-gray-400 border-b-2 border-transparent hover:text-gray-300 focus:outline-none transition">
                        ثبت‌نام
                    </button>
                </div>

                <div id="form-login" class="flex flex-col gap-y-5">
                    <h3 class="text-base font-medium text-gray-300 text-right">وارد حساب کاربری خود شوید</h3>
                    <input id="login-username"
                        class="w-full px-5 py-3.5 bg-[#0e1621] border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600/40 transition"
                        type="text" placeholder="Username" autocomplete="username">

                    <input id="login-password"
                        class="w-full px-5 py-3.5 bg-[#0e1621] border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600/40 transition"
                        type="password" placeholder="Password" autocomplete="current-password">

                    <button id="loginBtn"
                        class="w-full mt-2 py-3.5 bg-teal-600 hover:bg-teal-500 rounded-xl font-medium text-white transition shadow">
                        ورود
                    </button>
                </div>

                <div id="form-register" class="hidden flex flex-col gap-y-5">
                    <h3 class="text-base font-medium text-gray-300 text-right">ساخت حساب کاربری جدید</h3>
                    <input id="register-username"
                        class="w-full px-5 py-3.5 bg-[#0e1621] border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600/40 transition"
                        type="text" placeholder="Username (English)" autocomplete="off">

                    <input id="reg-password"
                        class="w-full px-5 py-3.5 bg-[#0e1621] border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600/40 transition"
                        type="password" placeholder="Password" autocomplete="off">

                    <input id="reg-confirm-password"
                        class="w-full px-5 py-3.5 bg-[#0e1621] border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600/40 transition"
                        type="password" placeholder="Confirm Password" autocomplete="off">

                    <button id="registerBtn"
                        class="w-full mt-2 py-3.5 bg-teal-600 hover:bg-teal-500 rounded-xl font-medium text-white transition shadow">
                        ثبت‌نام و عضویت
                    </button>
                </div>

                <div id="auth-error"
                    class="hidden mt-4 text-red-400 text-sm font-medium text-right bg-red-500/10 p-3 rounded-xl border border-red-500/20">
                </div>
                <div id="auth-success"
                    class="hidden mt-4 text-green-400 text-sm font-medium text-right bg-green-500/10 p-3 rounded-xl border border-green-500/20">
                </div>

            </div>
        </div>

        <div class="content flex-1 relative">
            {% include 'chat.html' %}
        </div>
    </div>
    <script src="{%static 'js/theme.js'%}"></script>
    <script type="module" src="{% static 'js/auth.js' %}"></script>
</body>

</html>
